# BuzzSpot Challenge — Default Configuration
# CVPPA@ECCV 2026

project:
  name: buzzspot
  seed: 42
  output_dir: outputs/
  experiment_name: rfdetr_temporal_v1

data:
  root: data/buzzset/
  train_ann: data/buzzset/annotations/train.json
  val_ann:   data/buzzset/annotations/valid.json
  test_ann:  data/buzzset/annotations/test.json
  num_classes: 4
  class_names: [bee, bumblebee, hoverfly, moth]
  category_ids: {bee: 1, bumblebee: 2, hoverfly: 3, moth: 4}

  tile:
    enabled: true
    size: 256
    overlap: 32
    min_visibility: 0.1

  temporal:
    num_frames: 6         # current + 5 previous (total = 6)
    strategy: stack       # stack | diff | flow | none

  num_workers: 8
  pin_memory: true

model:
  name: rfdetr_temporal
  backbone: dinov2_large
  pretrained: true
  pretrained_weights: null    # path to .pth weights, null = HuggingFace default
  num_queries: 300
  hidden_dim: 256
  nhead: 8
  enc_layers: 6
  dec_layers: 6
  dropout: 0.1

  temporal_head:
    type: query_fusion        # query_fusion | none
    num_frames: 6
    cross_attn_heads: 4

  attribute_heads:
    enabled: true
    attributes: [blur, occlusion]
    loss_weight: 0.5

training:
  experiment_name: rfdetr_temporal_v1   # overridable via CLI
  epochs: 100
  batch_size: 8
  accumulate_grad_batches: 4
  num_gpus: 1
  precision: 16

  optimizer:
    name: adamw
    lr: 1.0e-4
    backbone_lr_factor: 0.1
    weight_decay: 1.0e-4
    betas: [0.9, 0.999]

  scheduler:
    name: cosine_with_warmup
    warmup_epochs: 5
    min_lr: 1.0e-6

  curriculum:
    enabled: true
    phase1_epochs: 20
    blur_weight: 2.0
    occlusion_weight: 2.0

  # WeightedRandomSampler is disabled when curriculum is active
  # (incompatible index spaces — curriculum uses img_ids; sampler uses fixed indices).
  # Set to "class_balanced" only when curriculum.enabled is false.
  sampler:
    name: class_balanced
    oversample_classes: [moth, hoverfly]
    oversample_factor: 3.0

  early_stopping:
    enabled: true
    monitor: mAP_50_95
    patience: 20
    mode: max

  checkpoint:
    monitor: mAP_50_95
    mode: max

losses:
  classification:
    name: focal
    gamma: 2.0
    alpha: 0.25
    per_class_gamma:
      moth: 3.0
      hoverfly: 2.5

  bbox_regression:
    name: ciou
    weight: 5.0

  attribute:
    name: bce
    weight: 0.5

  hungarian_matcher:
    cost_class: 2.0
    cost_bbox: 5.0
    cost_giou: 2.0

augmentations:
  train:
    horizontal_flip: 0.5
    vertical_flip: 0.5
    random_rotate90: 0.5
    random_scale: [0.8, 1.2]
    random_crop_safe: true

    color_jitter:
      brightness: 0.4
      contrast: 0.4
      saturation: 0.4
      hue: 0.1
    random_hsv: true
    random_shadow: 0.3
    random_fog: 0.1
    random_sun_flare: 0.1

    motion_blur:
      prob: 0.4
      kernel_size: [3, 15]
      angle_range: [0, 360]
    gaussian_blur:
      prob: 0.2
      kernel_range: [3, 7]

    random_erasing:
      prob: 0.3
      scale: [0.02, 0.15]
      ratio: [0.3, 3.3]

    copy_paste:
      enabled: true
      masks_dir: data/sam2_masks/
      prob: 0.5
      classes: [moth, hoverfly]

    mosaic:
      prob: 0.3
      n_tiles: 4

  val:
    resize: 256

inference:
  tta:
    enabled: true
    scales: [0.8, 1.0, 1.2]
    flips: [none, horizontal, vertical]
    merge: wbf

  tiling:
    enabled: true
    tile_size: 256
    overlap: 32
    merge_iou_threshold: 0.5
    merge_type: wbf

  ensemble:
    enabled: true
    models:
      - weights: outputs/rfdetr_temporal_v1/best.pth
        weight: 1.0
      - weights: outputs/rfdetr_mega_v1/best.pth
        weight: 0.8
      - weights: outputs/yolov11_v1/best.pt
        weight: 0.6
    fusion: wbf
    iou_threshold: 0.5
    score_threshold: 0.01

  nms:
    iou_threshold: 0.5
    score_threshold: 0.01
    class_agnostic: false

  tracking:
    enabled: true
    method: bytetrack
    min_hits: 1
    max_age: 5

  confidence_threshold: 0.3

pseudo_labeling:
  enabled: false
  gdino_model: groundingdino_swint_ogc
  gdino_config: GroundingDINO_SwinT_OGC.py
  sam2_model: sam2_hiera_large
  prompts: ["bee", "bumblebee", "hoverfly", "moth"]
  box_threshold: 0.3
  text_threshold: 0.25
  self_training_epochs: 2
  confidence_filter: 0.5

evaluation:
  iou_thresholds: [0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8, 0.85, 0.9, 0.95]
  primary_metric: mAP_50_95
  per_class: true
  per_attribute: true
  per_size: true
  size_thresholds:
    small: 32
    medium: 96
  log_confusion_matrix: true
  visualize_predictions: true
  num_viz_samples: 50
