# Colab L4 GPU (24 GB VRAM, Ampere, bf16 supported)
# Usage: python src/train.py --config-name=colab_l4
defaults:
  - default
  - _self_

data:
  num_workers: 2
  temporal:
    num_frames: 1       # rfdetr discards context frames anyway; skip the 5× I/O
    strategy: none

model:
  temporal_head:
    type: none
  attribute_heads:
    enabled: false

training:
  batch_size: 16
  accumulate_grad_batches: 2   # effective batch = 32
  amp_dtype: bf16              # Ampere: bf16 is free throughput vs fp16
  freeze_backbone_epochs: 3
  log_every_n_steps: 25